spring.application.name=telaria-backend
server.port=8082

spring.datasource.url=jdbc:h2:file:./data/telaria-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=jorge
spring.datasource.password=prueba

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

keystore.location=keys.p12
keystore.password=miclavedelkeystore
keystore.private.name=jwt
keystore.private.password=miclavedelkeystore

bucket4j.enabled=true
bucket4j.filters[0].cache-name=rate-limit-buckets
bucket4j.filters[0].url=/api/.*
bucket4j.filters[0].rate-limits[0].cache-key=getRemoteAddr()
bucket4j.filters[0].rate-limits[0].bandwidths[0].capacity=10
bucket4j.filters[0].rate-limits[0].bandwidths[0].time=1
bucket4j.filters[0].rate-limits[0].bandwidths[0].unit=minutes