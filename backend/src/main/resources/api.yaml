openapi: 3.0.3
info:
  title: Telaria Backend API
  version: 1.0.0
  description: Authentication and user management API for Telaria backend

servers:
  - url: http://localhost:8082
    description: Local development server

paths:

  /auth/register:
    post:
      summary: Register new user
      operationId: registerUser
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              username: juanperez
              email: juan@example.com
              password: secreto123
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '409':
          description: User email already in use
        '400':
          description: Invalid registration data

  /auth/login:
    post:
      summary: Login
      operationId: login
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: juan@example.com
              password: secreto123
      responses:
        '200':
          description: Login successful, returns tokens
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Incorrect credentials

  /auth/logout:
    post:
      summary: Logout
      operationId: logout
      tags:
        - Authentication
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session closed successfully
        '401':
          description: Not authenticated

  /users:
    get:
      summary: Get all users
      operationId: getAllUsers
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Not authenticated
        '403':
          description: Forbidden

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 1
          example: juanperez
        email:
          type: string
          format: email
          example: juan@example.com
        password:
          type: string
          minLength: 1 #TODO ver si pongo más
          format: password
          example: secreto123

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          minLength: 1
          example: juan@example.com
        password:
          type: string
          format: password
          minLength: 1 #todo ver de canbiar
          example: secreto123

    LoginResponse:
      type: object
      required:
        - accessToken
        - refreshToken
      properties:
        accessToken:
          type: string
          description: Access token (JWT)
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        refreshToken:
          type: string
          description: Opaque refresh token
          example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...

    User:
      type: object
      properties:
        email:
          type: string
          format: email
          example: juan@example.com
        username:
          type: string
          example: juanperez
