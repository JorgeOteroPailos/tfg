schemas:
  IdResponse:
    type: object
    required:
      -id
    properties:
      id:
        type: string
        format: uuid

  RegisterRequest:
    type: object
    required:
      - username
      - email
      - password
    properties:
      username:
        type: string
        minLength: 1
        example: juanperez
      email:
        type: string
        format: email
        example: juan@example.com
      password:
        type: string
        minLength: 1
        format: password
        example: secreto123

  LoginRequest:
    type: object
    required:
      - email
      - password
    properties:
      email:
        type: string
        format: email
        minLength: 1
        example: juan@example.com
      password:
        type: string
        format: password
        minLength: 1
        example: secreto123

  LoginResponse:
    type: object
    required:
      - accessToken
      - refreshToken
      - username
    properties:
      accessToken:
        type: string
        description: Access token (JWT)
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      refreshToken:
        type: string
        description: Opaque refresh token
        example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...
      username:
        type: string
        description: User's username
        example: juan otero

  RefreshRequest:
    type: object
    required:
      - refreshToken
    properties:
      refreshToken:
        type: string
        description: Refresh Token obtained throuh login or register
        example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...

  RefreshResponse:
    type: object
    required:
      - accessToken
      - refreshToken
    properties:
      accessToken:
        type: string
        description: Access JWT token
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      refreshToken:
        type: string
        description: Opaque refresh Token
        example: dGhpcyBpcyBhIHJlZnJlc2ggdG9rZW4...

  TripSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        example: Viaje a Roma

  UserProfile:
    type: object
    properties:
      id:
        type: string
        format: uuid
      username:
        type: string

  JoinRequestSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      requester:
        $ref: '#/schemas/UserProfile'

  TripDetail:
    type: object
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      members:
        type: array
        items:
          $ref: '#/schemas/UserProfile'
      pendingRequests:
        type: array
        items:
          $ref: '#/schemas/JoinRequestSummary'

  CreateExpenseRequest:
    type: object
    required:
      - description
      - amount
      - date
      - beneficiaryIds
      - payerId
    properties:
      description:
        type: string
        example: Cena en trattoria
      amount:
        type: number
        format: double
        example: 90.00
      date:
        type: string
        format: date
        example: '2025-06-15'
      beneficiaryIds:
        type: array
        items:
          type: string
          format: uuid
      payerId:
        type: string
        format: uuid

  ExpenseSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      description:
        type: string
        example: Mocho en el Sham
      amount:
        type: number
        format: double
        example: 90.00
      date:
        type: string
        format: date
        example: '2025-06-15'
      payerId:
        type: string
        format: uuid

  Settlement:
    type: object
    properties:
      fromId:
        type: string
        format: uuid
      toId:
        type: string
        format: uuid
      amount:
        type: number
        format: double
        example: 25.00

  ResolveJoinRequest:
    type: object
    required:
      - accepted
    properties:
      accepted:
        type: boolean

  CreateInvitationRequest:
    type: object
    required:
      - tripId
    properties:
      tripId:
        type: string
        format: uuid

  InvitationSummary:
    type: object
    properties:
      id:
        type: string
        format: uuid
      tripId:
        type: string
        format: uuid
      tripName:
        type: string
        example: Viaje a Roma