openapi: 3.0.3
info:
  title: Telaria Backend API
  version: 1.0.0
  description: API for Telaria backend

servers:
  - url: http://localhost:8082
    description: Local development server

paths:
  /auth/register:
    $ref: './paths/auth.yaml#/paths/~1auth~1register'
  /auth/login:
    $ref: './paths/auth.yaml#/paths/~1auth~1login'
  /auth/logout:
    $ref: './paths/auth.yaml#/paths/~1auth~1logout'
  /auth/refresh:
    $ref: './paths/auth.yaml#/paths/~1auth~1refresh'
  /trips:
    $ref: './paths/trips.yaml#/paths/~1trips'
  /trips/{tripId}:
    $ref: './paths/trips.yaml#/paths/~1trips~1{tripId}'
  /trips/{tripId}/expenses:
    $ref: './paths/expenses.yaml#/paths/~1trips~1{tripId}~1expenses'
  /trips/{tripId}/expenses/{expenseId}:
    $ref: './paths/expenses.yaml#/paths/~1trips~1{tripId}~1expenses~1{expenseId}'
  /trips/{tripId}/balances:
    $ref: './paths/expenses.yaml#/paths/~1trips~1{tripId}~1balances'
  /trips/{tripId}/join-requests:
    $ref: './paths/membership.yaml#/paths/~1trips~1{tripId}~1join-requests'
  /trips/{tripId}/join-requests/{requestId}:
    $ref: './paths/membership.yaml#/paths/~1trips~1{tripId}~1join-requests~1{requestId}'
  /users/{userId}/invitations:
    $ref: './paths/membership.yaml#/paths/~1users~1{userId}~1invitations'
  /trips/{tripId}/members/me:
    $ref: './paths/membership.yaml#/paths/~1trips~1{tripId}~1members~1me'
  /users/me/invitations:
    $ref: './paths/membership.yaml#/paths/~1users~1me~1invitations'
  /users/me/invitations/{invitationId}:
    $ref: './paths/membership.yaml#/paths/~1users~1me~1invitations~1{invitationId}'
  /trips/{tripId}/events:
    $ref: './paths/events.yaml#/paths/~1trips~1{tripId}~1events'
  /trips/{tripId}/events/{eventId}:
    $ref: './paths/events.yaml#/paths/~1trips~1{tripId}~1events~1{eventId}'
  /trips/{tripId}/documents/{documentId}/confirm:
    $ref: './paths/documents.yaml#/paths/~1trips~1{tripId}~1documents~1{documentId}~1confirm'
  /trips/{tripId}/documents:
    $ref: './paths/documents.yaml#/paths/~1trips~1{tripId}~1documents'
  /trips/{tripId}/documents/{documentId}:
    $ref: './paths/documents.yaml#/paths/~1trips~1{tripId}~1documents~1{documentId}'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT