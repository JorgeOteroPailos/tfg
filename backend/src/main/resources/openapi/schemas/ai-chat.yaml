schemas:
  AiChatHistoryPage:
    type: object
    required:
      - messages
      - hasMore
    properties:
      messages:
        type: array
        items:
          $ref: '#/schemas/AiChatMessage'
      hasMore:
        type: boolean

  AiChatMessageRequest:
    type: object
    required:
      - content
    properties:
      content:
        type: string
        example: "¿Qué actividades hay disponibles en Roma en abril?"

  AiChatMessage:
    type: object
    required:
      - id
      - role
      - content
      - timestamp
    properties:
      id:
        type: string
        format: uuid
      role:
        type: string
        enum:
          - user
          - assistant
      content:
        type: string
      timestamp:
        type: string
        format: date-time
