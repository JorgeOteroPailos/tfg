schemas:
  DocumentUploadRequest:
    type: object
    required:
      - name
      - contentType
    properties:
      name:
        type: string
        example: billete_tren.pdf
      contentType:
        type: string
        example: application/pdf

  DocumentUploadResponse:
    type: object
    required:
      - documentId
      - uploadUrl
    properties:
      documentId:
        type: string
        format: uuid
      uploadUrl:
        type: string
        description: Presigned PUT URL to upload the file directly to Minio (expires in 15 minutes)
        example: http://localhost:9000/telaria/uuid-key?X-Amz-Signature=...

  DocumentResponse:
    type: object
    required:
      - id
      - name
      - uploaderId
      - uploadedAt
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
        example: billete_tren.pdf
      uploaderId:
        type: string
        format: uuid
      uploadedAt:
        type: string
        format: date-time
      previewUrl:
        type: string
        description: Presigned GET URL for a downscaled preview, only present for image documents with a generated thumbnail (expires in 15 minutes)
        example: http://localhost:9000/telaria/uuid-key.thumb.jpg?X-Amz-Signature=...

  DocumentDownloadResponse:
    type: object
    required:
      - downloadUrl
    properties:
      downloadUrl:
        type: string
        description: Presigned GET URL to download the file directly from Minio (expires in 15 minutes)
        example: http://localhost:9000/telaria/uuid-key?X-Amz-Signature=...