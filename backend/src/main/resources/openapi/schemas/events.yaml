schemas:
  CreateEventRequest:
    type: object
    required:
      - name
      - startTime
    properties:
      name:
        type: string
        minLength: 1
      startTime:
        type: string
        format: date-time
      duration:
        type: integer
        minimum: 0
        description: Duration in minutes
      location:
        $ref: '#/schemas/Location'

  EventSummary:
    type: object
    required:
      - id
      - name
      - startTime
      - duration
    properties:
      id:
        type: string
        format: uuid
      name:
        type: string
      startTime:
        type: string
        format: date-time
      duration:
        type: integer
      location:
        $ref: '#/schemas/Location'

  Location:
    type: object
    required:
    properties:
      name:
        type: string
        example: Restaurante Casa Pepe
      address:
        type: string
        example: Calle Mayor 1, Santiago
      latitude:
        type: number
        format: double
        minimum: -90
        maximum: 90
      longitude:
        type: number
        format: double
        minimum: -180
        maximum: 180
