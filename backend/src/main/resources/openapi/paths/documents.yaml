paths:
  /trips/{tripId}/documents/{documentId}/confirm:
    post:
      summary: Confirm that the upload to Minio completed successfully
      operationId: confirmDocumentUpload
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Document confirmed and marked as ACTIVE
        '404':
          description: Document not found or does not belong to this trip
        '409':
          description: File not found in storage (Minio verification failed)
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

  /trips/{tripId}/documents:
    post:
      summary: Request a presigned upload URL
      operationId: initDocumentUpload
      tags:
        - Documents
      security:
        - bearerAuth: [ ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/documents.yaml#/schemas/DocumentUploadRequest'
      responses:
        '201':
          description: Presigned upload URL generated, document created in PENDING state
          content:
            application/json:
              schema:
                $ref: '../schemas/documents.yaml#/schemas/DocumentUploadResponse'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip
    get:
      summary: List documents of a trip
      operationId: listDocuments
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          required: false
          description: >
            When present, only documents uploaded on this calendar day are returned.
          schema:
            type: string
            format: date
        - name: tzOffsetMinutes
          in: query
          required: false
          description: >
            Timezone offset of the requesting client as returned by JavaScript's
            Date.getTimezoneOffset() (minutes to add to local time to reach UTC).
            Used together with `date` to compute the calendar-day window in the
            client's timezone. Defaults to UTC when omitted.
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: >
            List of documents. Members see only ACTIVE documents.
            The uploader also sees their own PENDING documents.
            When the date filter is supplied, results are limited to that calendar day.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/documents.yaml#/schemas/DocumentResponse'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

  /trips/{tripId}/documents/{documentId}:
    get:
      summary: Get a presigned download URL for a document
      operationId: getDocumentDownloadUrl
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Presigned download URL (expires in 15 minutes)
          content:
            application/json:
              schema:
                $ref: '../schemas/documents.yaml#/schemas/DocumentDownloadResponse'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip
        '404':
          description: Document not found

    delete:
      summary: Delete a document
      operationId: deleteDocument
      tags:
        - Documents
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: documentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Document deleted successfully
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip
        '404':
          description: Document not found