paths:
  /users/me:
    get:
      summary: Get the authenticated user's profile
      operationId: getMyProfile
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile of the authenticated user
          content:
            application/json:
              schema:
                $ref: '../schemas/users.yaml#/schemas/OwnProfile'
        '401':
          description: Not authenticated

    patch:
      summary: Update the authenticated user's profile (username and/or email)
      operationId: updateMyProfile
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/users.yaml#/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '../schemas/users.yaml#/schemas/OwnProfile'
        '400':
          description: Invalid profile data
        '401':
          description: Not authenticated
        '409':
          description: Email already in use by another account

  /users/me/password:
    put:
      summary: Change the authenticated user's password
      description: >
        Requires the current password. On success all refresh tokens are revoked
        (sessions on other devices are logged out) and a fresh token pair is returned
        for the current device.
      operationId: changeMyPassword
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/users.yaml#/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed, new token pair issued
          content:
            application/json:
              schema:
                $ref: '../schemas/auth.yaml#/schemas/LoginResponse'
        '400':
          description: Invalid password data
        '401':
          description: Not authenticated or current password incorrect

  /users/me/avatar:
    post:
      summary: Request a presigned upload URL for the profile picture
      operationId: initAvatarUpload
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/users.yaml#/schemas/AvatarUploadRequest'
      responses:
        '201':
          description: Presigned upload URL generated, avatar pending confirmation
          content:
            application/json:
              schema:
                $ref: '../schemas/users.yaml#/schemas/AvatarUploadResponse'
        '401':
          description: Not authenticated

  /users/me/avatar/confirm:
    post:
      summary: Confirm that the avatar upload to Minio completed successfully
      operationId: confirmAvatarUpload
      tags:
        - Users
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Avatar confirmed and set as the user's profile picture
        '404':
          description: No pending avatar upload
        '409':
          description: File not found in storage (Minio verification failed)
        '401':
          description: Not authenticated

  /users/{userId}/avatar:
    get:
      summary: Get a presigned download URL for a user's profile picture
      operationId: getAvatarDownloadUrl
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Presigned download URL (expires in 15 minutes)
          content:
            application/json:
              schema:
                $ref: '../schemas/users.yaml#/schemas/AvatarDownloadResponse'
        '401':
          description: Not authenticated
        '404':
          description: User not found or has no profile picture
