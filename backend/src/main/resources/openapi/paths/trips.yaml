paths:
  /trips:
    post:
      summary: Create a new trip
      operationId: createTrip
      tags:
        - Trips
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: Viaje a Roma
      responses:
        '201':
          description: Trip created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '401':
          description: Not authenticated

    get:
      summary: List your trips
      operationId: listTrips
      tags:
        - Trips
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of trips the user belongs to
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas.yaml#/schemas/TripSummary'
        '401':
          description: Not authenticated

  /trips/{id}:
    get:
      summary: Get trip details
      operationId: getTrip
      tags:
        - Trips
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Trip details
          content:
            application/json:
              schema:
                $ref: '../schemas.yaml#/schemas/TripDetail'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip
        '404':
          description: Trip not found