paths:
  /trips/{tripId}/expenses:
    post:
      summary: Add an expense to a trip
      operationId: createExpense
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas.yaml#/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Expense created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
        '400':
          description: Invalid request body
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

    get:
      summary: List expenses of a trip
      operationId: listExpenses
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas.yaml#/schemas/ExpenseSummary'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

  /trips/{tripId}/expenses/{expenseId}:
    delete:
      summary: Delete an expense
      operationId: deleteExpense
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Expense deleted successfully
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip or not the payer

  /trips/{tripId}/balances:
    get:
      summary: Get balances for a trip
      operationId: getBalances
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of settlements to balance the trip
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas.yaml#/schemas/Settlement'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip