paths:
  /trips/{tripId}/expenses:
    post:
      summary: Add an expense to a trip
      operationId: createExpense
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/expenses.yaml#/schemas/CreateExpenseRequest'
      responses:
        '201':
          description: Expense created successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/shared/common.yaml#/schemas/IdResponse'
        '400':
          description: Invalid request body
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

    get:
      summary: List expenses of a trip
      operationId: listExpenses
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/expenses.yaml#/schemas/ExpenseSummary'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

  /trips/{tripId}/expenses/{expenseId}:
    get:
      summary: get details from an expense
      operationId: getExpense
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Expense details
          content:
            application/json:
              schema:
                $ref: '../schemas/expenses.yaml#/schemas/ExpenseDetail'

    delete:
      summary: Delete an expense
      operationId: deleteExpense
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: expenseId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Expense deleted successfully
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

  /trips/{tripId}/balances:
    get:
      summary: Get balances for a trip
      operationId: getBalances
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Balances and settlements for the trip
          content:
            application/json:
              schema:
                $ref: '../schemas/expenses.yaml#/schemas/BalancesInfo'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

  /trips/{tripId}/settlements:
    get:
      summary: List past settlements for a trip
      operationId: listSettlements
      tags:
        - Expenses
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of recorded settlements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/expenses.yaml#/schemas/PastSettlement'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip

    post:
      summary: Pay a settlement
      operationId: createSettlement
      tags:
        - Expenses
      security:
        - bearerAuth: [ ]
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '../schemas/expenses.yaml#/schemas/CreateSettlementRequest'
      responses:
        '201':
          description: Settlement added successfully
          content:
            application/json:
              schema:
                $ref: '../schemas/shared/common.yaml#/schemas/IdResponse'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip
