paths:
  /trips/{tripId}/ai-chat:
    get:
      summary: Get the AI chat history for a trip
      operationId: getAiChatHistory
      tags:
        - AiChat
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: before
          in: query
          required: false
          description: Return messages sent before this timestamp (ISO 8601). Omit to get the most recent page.
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Up to 50 messages, ordered oldest-first. hasMore=true means older messages exist.
          content:
            application/json:
              schema:
                $ref: '../schemas/ai-chat.yaml#/schemas/AiChatHistoryPage'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip
        '404':
          description: Trip not found
