paths:
  /trips/{tripId}/ai-chat:
    get:
      summary: Get the AI chat history for a trip
      operationId: getAiChatHistory
      tags:
        - AiChat
      security:
        - bearerAuth: []
      parameters:
        - name: tripId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Full message history for this trip's AI conversation
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '../schemas/ai-chat.yaml#/schemas/AiChatMessage'
        '401':
          description: Not authenticated
        '403':
          description: Not a member of this trip
        '404':
          description: Trip not found
